x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: platform/airflow/Dockerfile
  image: open-dataops-airflow:${AIRFLOW_VERSION:-2.10.5}
  restart: unless-stopped
  environment: &airflow-environment
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dataops:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/runtime/logs/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?Set AIRFLOW_SECRET_KEY in .env}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: dataops
    POSTGRES_USER: dataops
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    DBT_LOG_PATH: /opt/airflow/runtime/logs/jobs/dbt
    DBT_ARTIFACT_ROOT: /opt/airflow/runtime/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./platform/airflow/dags:/opt/airflow/dags:ro
    - ./runtime:/opt/airflow/runtime
    - ./:/opt/open-dataops:ro
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:16
    container_name: open-dataops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dataops
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./platform/warehouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataops -d dataops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  airflow-init:
    build:
      context: .
      dockerfile: platform/airflow/Dockerfile
    image: open-dataops-airflow:${AIRFLOW_VERSION:-2.10.5}
    restart: "no"
    environment:
      <<: *airflow-environment
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?Set AIRFLOW_ADMIN_PASSWORD in .env}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        (airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com ||
        airflow users list | grep -Fq "$${AIRFLOW_ADMIN_USERNAME}")
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./runtime:/opt/airflow/runtime
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  grafana-db-init:
    image: postgres:16
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: dataops
      PGUSER: dataops
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD:?Set GRAFANA_POSTGRES_PASSWORD in .env}
    command:
      - /bin/sh
      - -c
      - >-
        psql --set=ON_ERROR_STOP=1
        --file=/opt/open-dataops/create_grafana_reader.sql &&
        psql --set=ON_ERROR_STOP=1
        --set=reader_password="$$GRAFANA_POSTGRES_PASSWORD"
        --file=/opt/open-dataops/configure_grafana_reader.sql
    volumes:
      - ./platform/warehouse/init/06_create_grafana_reader.sql:/opt/open-dataops/create_grafana_reader.sql:ro
      - ./platform/warehouse/sql/configure_grafana_reader.sql:/opt/open-dataops/configure_grafana_reader.sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:${GRAFANA_VERSION:-11.5.2}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD:?Set GRAFANA_POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./platform/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./platform/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      grafana-db-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  grafana_data:
