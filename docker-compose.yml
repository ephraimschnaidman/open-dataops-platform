services:
  postgres:
    # PostgreSQL is the only service in this milestone. Future services can join
    # the default Compose network and connect to the hostname "postgres".
    image: postgres:16

    # A stable container name makes local troubleshooting commands predictable.
    container_name: open-dataops-postgres

    # Keep the warehouse running across host restarts unless it is stopped manually.
    restart: unless-stopped

    environment:
      # The official postgres image creates this database and user on first
      # initialization when the data volume is empty.
      POSTGRES_DB: dataops
      POSTGRES_USER: dataops
      # Docker Compose reads POSTGRES_PASSWORD from the local .env file.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

    ports:
      # Bind to localhost so local tools can connect without exposing Postgres
      # on every host network interface.
      - "127.0.0.1:5433:5432"

    volumes:
      # Persist database files independently of the container lifecycle.
      - postgres_data:/var/lib/postgresql/data

      # SQL files in this directory run automatically on first database
      # initialization, in filename order.
      - ./platform/warehouse/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      # pg_isready gives Compose and future services a reliable readiness signal.
      test: ["CMD-SHELL", "pg_isready -U dataops -d dataops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  # Named volume managed by Docker for durable local warehouse storage.
  postgres_data:
