version: 2

models:
  - name: stg_customers
    description: Clean staging view over raw e-commerce customers.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: stg_products
    description: Clean staging view over raw e-commerce products.
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: stg_orders
    description: Clean staging view over raw e-commerce orders.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - canceled
                  - refunded

  - name: stg_order_items
    description: Clean staging view over raw e-commerce order items.
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  - name: stg_payments
    description: Clean staging view over raw e-commerce payments.
    columns:
      - name: payment_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - paid
                  - failed
                  - refunded

  - name: stg_web_events
    description: Clean staging view over raw e-commerce web events.
    columns:
      - name: event_id
        data_tests:
          - not_null
          - unique
