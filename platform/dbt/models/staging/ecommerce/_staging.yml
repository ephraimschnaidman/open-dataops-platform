version: 2

models:
  - name: stg_customers
    description: Clean staging view over raw e-commerce customers.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: stg_products
    description: Clean staging view over raw e-commerce products.
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: category
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - apparel
                  - home
                  - electronics
                  - beauty
                  - outdoor
                  - pets

  - name: stg_orders
    description: Clean staging view over raw e-commerce orders.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - canceled
                  - refunded

  - name: stg_order_items
    description: Clean staging view over raw e-commerce order items.
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  - name: stg_payments
    description: Clean staging view over raw e-commerce payments.
    columns:
      - name: payment_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: payment_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - paid
                  - failed
                  - refunded
      - name: payment_method
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - card
                  - paypal
                  - apple_pay

  - name: stg_web_events
    description: Clean staging view over raw e-commerce web events.
    columns:
      - name: event_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: product_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: event_type
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - product_view
                  - checkout_completed
                  - page_view
                  - search
                  - add_to_cart
      - name: channel
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - email
                  - paid_search
                  - organic
                  - direct
                  - paid_social
      - name: device
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - mobile
                  - desktop
